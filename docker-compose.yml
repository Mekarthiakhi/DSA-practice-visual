services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
        VITE_EXECUTION_API_URL: /api/execute
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - EXECUTION_SERVICE_URL=${EXECUTION_SERVICE_URL:-}
      - EXECUTION_SERVICE_TOKEN=${EXECUTION_SERVICE_TOKEN:-}
      - CORS_ORIGINS=http://localhost:5173
      - NODE_ENV=production
    restart: unless-stopped
